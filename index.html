<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>123 Lets Learn English Under the Palm Tree</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
min-height:100vh;
font-family:"Segoe UI",Tahoma,Geneva,Verdana,sans-serif;
background:linear-gradient(135deg,#f5efe6,#e8dcc8);
color:#2f2f2f;
display:grid;
place-items:center;
padding:1rem;
}

.storybook{
width:min(92vw,760px);
background:#f9f4ec;
border:2px solid #8b5e3c33;
border-radius:18px;
box-shadow:0 20px 40px rgba(0,0,0,.15);
padding:1.3rem;
}

.story-header{
border-bottom:2px solid #7a2e3a22;
padding-bottom:.9rem;
margin-bottom:.9rem;
}

.badge{
margin:0 0 .4rem;
font-size:.8rem;
color:#3a5f4b;
font-weight:600;
}

h1{
margin:0;
font-size:clamp(1.15rem,2.6vw,1.7rem);
color:#7a2e3a;
}

.chapter-counter{
margin-top:.4rem;
color:#3a5f4b;
}

.story-body{
display:grid;
gap:1rem;
}

#chapter-text{
margin:0;
line-height:1.9;
font-size:1.06rem;
}

.choices{
display:grid;
gap:.55rem;
}

.choices-label{
font-weight:600;
color:#7a2e3a;
}

.choice-btn{
border:2px solid #3a5f4b33;
background:white;
border-radius:12px;
padding:.65rem .8rem;
cursor:pointer;
transition:.2s;
}

.choice-btn:hover{
background:#e8dcc8;
}

.choice-result{
border-left:4px solid #7a2e3a;
padding-left:.7rem;
color:#3a5f4b;
}

.controls{
margin-top:1rem;
display:flex;
gap:.55rem;
}

.controls button{
border:0;
border-radius:999px;
padding:.55rem 1rem;
font-weight:700;
cursor:pointer;
}

#next-btn,#prev-btn{
background:#3a5f4b;
color:white;
}

#restart-btn{
margin-left:auto;
background:#7a2e3a;
color:white;
}

.speech-box{
margin-top:20px;
padding:15px;
background:#fff;
border-radius:12px;
border:2px solid #3a5f4b22;
}

.speak-btn{
background:#3a5f4b;
color:white;
border:none;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

</style>

</head>

<body>

<main class="storybook">

<header class="story-header">
<p class="badge">123 Lets Learn English Under the Palm Tree</p>
<h1 id="chapter-title"></h1>
<p id="chapter-counter"></p>
</header>

<section class="story-body">
<p id="chapter-text"></p>

<div class="choices">
<p class="choices-label">Pick your learning move:</p>
<button id="choice-a" class="choice-btn"></button>
<button id="choice-b" class="choice-btn"></button>
</div>

<p id="choice-result" class="choice-result"></p>

</section>

<footer class="controls">
<button id="prev-btn">Previous</button>
<button id="next-btn">Next</button>
<button id="restart-btn">Restart</button>
</footer>

<div class="speech-box">

<p id="expectedText">Hello John</p>

<button class="speak-btn" onclick="startListening()">
🎤 Speak
</button>

<p id="studentSpeech"></p>
<p id="feedback"></p>

</div>

</main>

<script>

const chapters=[

{
title:"Chapter 1: Under the Palm Tree",
text:"Teacher Lina writes in the sand: 1,2,3 Today we learn English under the palm tree",
choices:["Say: One Two Three","Say: Uno Dos Tres"],
results:["Great!","Nice try"]
},

{
title:"Chapter 2: Hello",
text:"A parrot lands near the palm tree",
choices:["Say Hello","Say Goodbye"],
results:["Correct","Not correct"]
}

];

let chapterIndex=0;

const titleEl=document.getElementById("chapter-title");
const counterEl=document.getElementById("chapter-counter");
const textEl=document.getElementById("chapter-text");
const choiceA=document.getElementById("choice-a");
const choiceB=document.getElementById("choice-b");
const resultEl=document.getElementById("choice-result");

function render(){

const chapter=chapters[chapterIndex];

titleEl.textContent=chapter.title;
counterEl.textContent=`Chapter ${chapterIndex+1}`;
textEl.textContent=chapter.text;

choiceA.textContent=chapter.choices[0];
choiceB.textContent=chapter.choices[1];

}

choiceA.onclick=()=>resultEl.textContent=chapters[chapterIndex].results[0];
choiceB.onclick=()=>resultEl.textContent=chapters[chapterIndex].results[1];

document.getElementById("next-btn").onclick=()=>{
chapterIndex++;
if(chapterIndex>=chapters.length)chapterIndex=0;
render();
};

document.getElementById("prev-btn").onclick=()=>{
chapterIndex--;
if(chapterIndex<0)chapterIndex=0;
render();
};

document.getElementById("restart-btn").onclick=()=>{
chapterIndex=0;
render();
};

render();

</script>


<script>

const SpeechRecognition=
window.SpeechRecognition||
window.webkitSpeechRecognition;

const recognition=new SpeechRecognition();

recognition.lang="en-US";

function startListening(){

recognition.start();

}

recognition.onresult=function(event){

const speechResult=
event.results[0][0].transcript;

document.getElementById("studentSpeech").innerText=speechResult;

analyzeSpeech(speechResult);

}

function analyzeSpeech(text){

const expected=
document.getElementById("expectedText").innerText;

const cleanText=
text.toLowerCase().replace(/[.,!?]/g,'')

const cleanExpected=
expected.toLowerCase().replace(/[.,!?]/g,'')

if(cleanText===cleanExpected){

document.getElementById("feedback")
.innerText="Excellent pronunciation 🌴";

}else{

document.getElementById("feedback")
.innerText="Try again...";

}

}

</script>

</body>
</html>
