<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interactive Storybook - HTML5</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at top, #1e293b, #020617 70%);
        color: #e2e8f0;
        display: grid;
        place-items: center;
        padding: 1rem;
      }
      .storybook {
        width: min(92vw, 760px);
        background: rgba(15, 23, 42, 0.92);
        border: 1px solid rgba(148, 163, 184, 0.3);
        border-radius: 16px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
        padding: 1.2rem;
      }
      .story-header {
        border-bottom: 1px solid rgba(148, 163, 184, 0.3);
        padding-bottom: 0.9rem;
        margin-bottom: 0.9rem;
      }
      .badge { margin: 0 0 0.4rem; font-size: 0.8rem; color: #93c5fd; }
      h1 { margin: 0; font-size: clamp(1.15rem, 2.6vw, 1.7rem); }
      .chapter-counter { margin-top: 0.4rem; color: #cbd5e1; }
      .story-body { display: grid; gap: 1rem; }
      #chapter-text { margin: 0; line-height: 1.9; font-size: 1.06rem; }
      .choices { display: grid; gap: 0.55rem; }
      .choices-label { margin: 0; font-weight: 600; color: #a5f3fc; }
      .choice-btn {
        border: 1px solid #334155;
        background: #1e293b;
        color: #f8fafc;
        border-radius: 10px;
        padding: 0.62rem 0.75rem;
        font-size: 0.98rem;
        cursor: pointer;
        text-align: left;
      }
      .choice-btn:hover { background: #334155; }
      .choice-result {
        margin: 0;
        border-left: 3px solid #22d3ee;
        padding-left: 0.7rem;
        color: #fef9c3;
        min-height: 2.2rem;
      }
      .controls { margin-top: 1rem; display: flex; gap: 0.55rem; }
      .controls button {
        border: 0;
        border-radius: 999px;
        padding: 0.5rem 0.9rem;
        font-weight: 700;
        cursor: pointer;
      }
      #restart-btn { margin-left: auto; background: #7c3aed; color: #fff; }
      #next-btn, #prev-btn { background: #0ea5e9; color: #082f49; }
      .controls button:disabled { opacity: 0.45; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <main class="storybook">
      <header class="story-header">
        <p class="badge">Interactive Storybook - HTML5</p>
        <h1 id="chapter-title">Chapter 1: The Mysterious Letter</h1>
        <p id="chapter-counter" class="chapter-counter">Chapter 1 of 9</p>
      </header>

      <section class="story-body">
        <p id="chapter-text"></p>
        <div class="choices">
          <p class="choices-label">What do you do?</p>
          <button id="choice-a" class="choice-btn"></button>
          <button id="choice-b" class="choice-btn"></button>
        </div>
        <p id="choice-result" class="choice-result"></p>
      </section>

      <footer class="controls">
        <button id="prev-btn" disabled>Previous</button>
        <button id="next-btn">Next</button>
        <button id="restart-btn">Restart</button>
      </footer>
    </main>

    <script>
      const chapters = [
        { title: "Chapter 1: The Mysterious Letter", text: "On a quiet night, you receive an unsigned letter: 'If you want to see the City in the Sky, follow the blue light.'", choices: ["Follow the light now", "Wait until sunrise"], results: ["Bold move! You find a glowing trail leading out of town.", "Careful choice... but by morning, the trail is weaker."] },
        { title: "Chapter 2: Bridge of Fog", text: "You reach an ancient bridge covered in fog. Below, a river with no end. A strange voice calls your name.", choices: ["Cross quickly", "Move slowly and inspect the path"], results: ["Your speed saves you from shadows behind you.", "You discover a carved symbol that may help later."] },
        { title: "Chapter 3: The Map Seller", text: "In an abandoned market, a map seller claims he knows the route to the sky city—for a small favor.", choices: ["Accept the offer", "Refuse and search alone"], results: ["He gives you a torn map with a clear mark to the north.", "Independence feels good, but you lose time in the alleys."] },
        { title: "Chapter 4: Gate of Winds", text: "A stone gate appears. It opens only when the wind plays the correct note.", choices: ["Whistle a simple melody", "Wait for the wind"], results: ["The melody shifts the stones; the gate opens halfway.", "Your patience works—the wind opens the gate fully."] },
        { title: "Chapter 5: Garden of Time", text: "Inside is a garden where time moves backward, and every minute the trees change shape.", choices: ["Follow the silver tree", "Follow the ticking sound"], results: ["The silver tree leads you to a short, safe passage.", "The ticking leads to a chamber full of hidden keys."] },
        { title: "Chapter 6: The Sleeping Guardian", text: "Before the summit, a giant guardian sleeps beside a celestial bell.", choices: ["Sneak past quietly", "Wake him and ask the way"], results: ["You slip by, but lose one of your tools.", "He wakes, smiles, and says: 'At last, someone brave enough.'"] },
        { title: "Chapter 7: Stairway of Clouds", text: "A staircase of light rises through the clouds, appearing and vanishing in rhythm.", choices: ["Climb fast when it appears", "Study the rhythm, then climb"], results: ["Your energy gets you up, even with a few stumbles.", "Precision makes your climb steady and safe."] },
        { title: "Chapter 8: Mirror of Truth", text: "In the final hall, a mirror shows a frightened version of you begging to turn back.", choices: ["Break the mirror", "Speak to your reflection"], results: ["Fear disappears quickly, but leaves a heavy feeling.", "Understanding your fear turns the reflection into warm light."] },
        { title: "Chapter 9: The City in the Sky", text: "You finally arrive and discover the letter was sent by you... from the future.", choices: ["Send a new letter to your past self", "Stay and begin a new life"], results: ["The time loop closes—and everything finally makes sense.", "You choose a new beginning, and the city becomes your home."] }
      ];

      const titleEl = document.getElementById("chapter-title");
      const counterEl = document.getElementById("chapter-counter");
      const textEl = document.getElementById("chapter-text");
      const choiceAButton = document.getElementById("choice-a");
      const choiceBButton = document.getElementById("choice-b");
      const choiceResultEl = document.getElementById("choice-result");
      const prevBtn = document.getElementById("prev-btn");
      const nextBtn = document.getElementById("next-btn");
      const restartBtn = document.getElementById("restart-btn");

      let chapterIndex = 0;
      const chapterDecisions = new Array(chapters.length).fill(null);

      function renderChapter() {
        const chapter = chapters[chapterIndex];
        titleEl.textContent = chapter.title;
        counterEl.textContent = `Chapter ${chapterIndex + 1} of ${chapters.length}`;
        textEl.textContent = chapter.text;
        choiceAButton.textContent = chapter.choices[0];
        choiceBButton.textContent = chapter.choices[1];

        const saved = chapterDecisions[chapterIndex];
        choiceResultEl.textContent = saved === null
          ? "Choose one option to reveal the outcome."
          : chapter.results[saved];

        prevBtn.disabled = chapterIndex === 0;
        nextBtn.disabled = chapterIndex === chapters.length - 1;
      }

      function choose(index) {
        chapterDecisions[chapterIndex] = index;
        choiceResultEl.textContent = chapters[chapterIndex].results[index];
      }

      choiceAButton.addEventListener("click", () => choose(0));
      choiceBButton.addEventListener("click", () => choose(1));

      prevBtn.addEventListener("click", () => {
        if (chapterIndex > 0) {
          chapterIndex -= 1;
          renderChapter();
        }
      });

      nextBtn.addEventListener("click", () => {
        if (chapterIndex < chapters.length - 1) {
          chapterIndex += 1;
          renderChapter();
        }
      });

      restartBtn.addEventListener("click", () => {
        chapterIndex = 0;
        chapterDecisions.fill(null);
        renderChapter();
      });

      renderChapter();
    </script>
  </body>
</html>
